server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # When nginx auto-redirects /foo to /foo/, use a relative Location header
    # so Cloudflare doesn't have to upgrade an http origin response to https.
    absolute_redirect off;
    port_in_redirect off;

    # @astrojs/sitemap writes sitemap-index.xml + sitemap-0.xml. Most SEO tools
    # and crawlers default to /sitemap.xml, so redirect there to the index so
    # external validators that don't read robots.txt still find it.
    location = /sitemap.xml {
        return 301 /sitemap-index.xml;
    }

    # SPA-style fallback for clean URLs
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    error_page 404 /404.html;
}
